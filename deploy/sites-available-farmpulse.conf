# farmpulse — nginx (готовый фрагмент для /etc/nginx/sites-available/farmpulse)
# Домен: farmpulse.its-good.ru
# Сокет PHP: ls /run/php/php*-fpm.sock — при необходимости замените php8.3

# HTTPS — web + api (PHP) + app-api (Python uvicorn на 127.0.0.1:8000)
server {
    server_name farmpulse.its-good.ru;

    root /var/www/farmpulse/web;
    index index.php;

    location ^~ /api/ {
        alias /var/www/farmpulse/api/;
        location ~ \.php$ {
            include snippets/fastcgi-php.conf;
            fastcgi_pass unix:/run/php/php8.3-fpm.sock;
            fastcgi_param SCRIPT_FILENAME $request_filename;
            include fastcgi_params;
        }
    }

    location ^~ /app-api/ {
        proxy_pass http://127.0.0.1:8000/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 86400;
    }

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        include snippets/fastcgi-php.conf;
        fastcgi_pass unix:/run/php/php8.3-fpm.sock;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
    }

    location ~ /\. {
        deny all;
    }

    listen [::]:443 ssl ipv6only=on;
    listen 443 ssl;
    ssl_certificate /etc/letsencrypt/live/farmpulse.its-good.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/farmpulse.its-good.ru/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}

# HTTP → редирект на HTTPS (certbot)
server {
    if ($host = farmpulse.its-good.ru) {
        return 301 https://$host$request_uri;
    }

    listen 80;
    listen [::]:80;
    server_name farmpulse.its-good.ru;
    return 404;
}
